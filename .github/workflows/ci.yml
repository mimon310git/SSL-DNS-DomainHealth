name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project and dev tooling
        run: |
          python -m pip install -e .[yaml]
          python -m pip install build ruff

      - name: Lint
        run: ruff check .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke-compile sources
        run: python -m compileall src main.py

      - name: Build package
        run: python -m build